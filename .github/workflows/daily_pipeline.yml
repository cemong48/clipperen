name: Daily Content Pipeline
on:
  schedule:
    - cron: '0 0 * * *'  # 00:00 UTC = 07:00 WIB
  workflow_dispatch:

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp openai-whisper

      - name: Check seed verification status
        run: |
          if [ ! -f "logs/seed_verification_report.json" ]; then
            echo "WARNING: Seeds not verified. Run scripts/verify_seeds.py first."
          fi

      - name: Auto-deploy CF Workers
        run: |
          echo "=== Auto-deploying CF Workers ==="
          DEPLOYED=0
          for i in 1 2 3 4 5; do
            ACCT_VAR="CF_ACCOUNT_ID_${i}"
            TOKEN_VAR="CF_API_TOKEN_${i}"
            NAME_VAR="CF_WORKER_NAME_${i}"
            # Trim whitespace/newlines from secret values
            ACCT_ID=$(echo "${!ACCT_VAR}" | tr -d '[:space:]')
            API_TOKEN=$(echo "${!TOKEN_VAR}" | tr -d '[:space:]')
            WORKER_NAME=$(echo "${!NAME_VAR}" | tr -d '[:space:]')
            WORKER_NAME="${WORKER_NAME:-yt-transcript-proxy}"
            
            echo "Worker #${i}: ACCT_ID length=${#ACCT_ID}, TOKEN length=${#API_TOKEN}, name=${WORKER_NAME}"
            
            if [ -n "$ACCT_ID" ] && [ -n "$API_TOKEN" ]; then
              echo "Deploying worker #${i} (${WORKER_NAME})..."
              DEPLOY_URL="https://api.cloudflare.com/client/v4/accounts/${ACCT_ID}/workers/scripts/${WORKER_NAME}"
              # Use multipart form upload for ES modules (export default syntax)
              HTTP_CODE=$(curl -s -o /tmp/cf_deploy_${i}.json -w "%{http_code}" \
                -X PUT "$DEPLOY_URL" \
                -H "Authorization: Bearer ${API_TOKEN}" \
                -F "worker.js=@cloudflare/worker.js;type=application/javascript+module" \
                -F 'metadata={"main_module":"worker.js"};type=application/json')
              
              if [ "$HTTP_CODE" = "200" ]; then
                echo "  Worker #${i}: DEPLOYED OK"
                DEPLOYED=$((DEPLOYED + 1))
              else
                echo "  Worker #${i}: DEPLOY FAILED (HTTP ${HTTP_CODE})"
                cat /tmp/cf_deploy_${i}.json 2>/dev/null
              fi
            else
              echo "Worker #${i}: SKIPPED (ACCT_ID empty=${#ACCT_ID}, TOKEN empty=${#API_TOKEN})"
            fi
          done
          echo "Deployed ${DEPLOYED}/5 workers"
        env:
          CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_ACCOUNT_ID_2: ${{ secrets.CF_ACCOUNT_ID_2 }}
          CF_ACCOUNT_ID_3: ${{ secrets.CF_ACCOUNT_ID_3 }}
          CF_ACCOUNT_ID_4: ${{ secrets.CF_ACCOUNT_ID_4 }}
          CF_ACCOUNT_ID_5: ${{ secrets.CF_ACCOUNT_ID_5 }}
          CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
          CF_API_TOKEN_2: ${{ secrets.CF_API_TOKEN_2 }}
          CF_API_TOKEN_3: ${{ secrets.CF_API_TOKEN_3 }}
          CF_API_TOKEN_4: ${{ secrets.CF_API_TOKEN_4 }}
          CF_API_TOKEN_5: ${{ secrets.CF_API_TOKEN_5 }}
          CF_WORKER_NAME_1: ${{ secrets.CF_WORKER_NAME_1 }}
          CF_WORKER_NAME_2: ${{ secrets.CF_WORKER_NAME_2 }}
          CF_WORKER_NAME_3: ${{ secrets.CF_WORKER_NAME_3 }}
          CF_WORKER_NAME_4: ${{ secrets.CF_WORKER_NAME_4 }}
          CF_WORKER_NAME_5: ${{ secrets.CF_WORKER_NAME_5 }}

      - name: Verify CF Workers alive
        run: |
          echo "=== CF Worker Health Check ==="
          for i in 1 2 3 4 5; do
            URL_VAR="CF_WORKER_URL_${i}"
            AUTH_VAR="CF_WORKER_AUTH_KEY_${i}"
            URL="${!URL_VAR}"
            AUTH="${!AUTH_VAR}"
            
            if [ -z "$URL" ]; then
              echo "Worker #${i}: URL not set — SKIPPED"
              continue
            fi
            
            HTTP_CODE=$(curl -s -o /tmp/cf_check_${i}.json -w "%{http_code}" \
              -X POST "$URL" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Key: ${AUTH}" \
              -d '{"action":"playability","video_id":"dQw4w9WgXcQ"}' \
              --max-time 10)
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Worker #${i}: ALIVE (HTTP 200)"
            elif [ "$HTTP_CODE" = "000" ]; then
              echo "Worker #${i}: NOT REACHABLE (connection failed)"
            else
              echo "Worker #${i}: HTTP ${HTTP_CODE}"
            fi
          done
        env:
          CF_WORKER_URL_1: ${{ secrets.CF_WORKER_URL_1 }}
          CF_WORKER_URL_2: ${{ secrets.CF_WORKER_URL_2 }}
          CF_WORKER_URL_3: ${{ secrets.CF_WORKER_URL_3 }}
          CF_WORKER_URL_4: ${{ secrets.CF_WORKER_URL_4 }}
          CF_WORKER_URL_5: ${{ secrets.CF_WORKER_URL_5 }}
          CF_WORKER_AUTH_KEY_1: ${{ secrets.CF_WORKER_AUTH_KEY_1 }}
          CF_WORKER_AUTH_KEY_2: ${{ secrets.CF_WORKER_AUTH_KEY_2 }}
          CF_WORKER_AUTH_KEY_3: ${{ secrets.CF_WORKER_AUTH_KEY_3 }}
          CF_WORKER_AUTH_KEY_4: ${{ secrets.CF_WORKER_AUTH_KEY_4 }}
          CF_WORKER_AUTH_KEY_5: ${{ secrets.CF_WORKER_AUTH_KEY_5 }}

      - name: Setup cookies
        run: |
          mkdir -p temp
          for i in 1 2 3 4 5; do
            VAR_NAME="YOUTUBE_COOKIES_${i}"
            COOKIE_VAL="${!VAR_NAME}"
            if [ -n "$COOKIE_VAL" ]; then
              echo "$COOKIE_VAL" > "temp/cookies_${i}.txt"
              echo "Cookies #${i}: written ($(wc -c < temp/cookies_${i}.txt) bytes)"
            else
              echo "Cookies #${i}: NOT SET"
            fi
          done
          echo "Converting cookies to Netscape format..."
          python scripts/convert_cookies.py
        env:
          YOUTUBE_COOKIES_1: ${{ secrets.YOUTUBE_COOKIES_1 }}
          YOUTUBE_COOKIES_2: ${{ secrets.YOUTUBE_COOKIES_2 }}
          YOUTUBE_COOKIES_3: ${{ secrets.YOUTUBE_COOKIES_3 }}
          YOUTUBE_COOKIES_4: ${{ secrets.YOUTUBE_COOKIES_4 }}
          YOUTUBE_COOKIES_5: ${{ secrets.YOUTUBE_COOKIES_5 }}

      - name: Run pipeline
        env:
          # Per-channel YouTube credentials (1=psyched, 2=minted, 3=vitals, 4=wired, 5=sage)
          YOUTUBE_API_KEY_1: ${{ secrets.YOUTUBE_API_KEY_1 }}
          YOUTUBE_API_KEY_2: ${{ secrets.YOUTUBE_API_KEY_2 }}
          YOUTUBE_API_KEY_3: ${{ secrets.YOUTUBE_API_KEY_3 }}
          YOUTUBE_API_KEY_4: ${{ secrets.YOUTUBE_API_KEY_4 }}
          YOUTUBE_API_KEY_5: ${{ secrets.YOUTUBE_API_KEY_5 }}
          YOUTUBE_CLIENT_SECRET_1: ${{ secrets.YOUTUBE_CLIENT_SECRET_1 }}
          YOUTUBE_CLIENT_SECRET_2: ${{ secrets.YOUTUBE_CLIENT_SECRET_2 }}
          YOUTUBE_CLIENT_SECRET_3: ${{ secrets.YOUTUBE_CLIENT_SECRET_3 }}
          YOUTUBE_CLIENT_SECRET_4: ${{ secrets.YOUTUBE_CLIENT_SECRET_4 }}
          YOUTUBE_CLIENT_SECRET_5: ${{ secrets.YOUTUBE_CLIENT_SECRET_5 }}
          YOUTUBE_REFRESH_TOKEN_1: ${{ secrets.YOUTUBE_REFRESH_TOKEN_1 }}
          YOUTUBE_REFRESH_TOKEN_2: ${{ secrets.YOUTUBE_REFRESH_TOKEN_2 }}
          YOUTUBE_REFRESH_TOKEN_3: ${{ secrets.YOUTUBE_REFRESH_TOKEN_3 }}
          YOUTUBE_REFRESH_TOKEN_4: ${{ secrets.YOUTUBE_REFRESH_TOKEN_4 }}
          YOUTUBE_REFRESH_TOKEN_5: ${{ secrets.YOUTUBE_REFRESH_TOKEN_5 }}
          # Per-channel Gemini API keys
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          # Cloudflare Worker proxy (for transcript extraction)
          CF_WORKER_URL_1: ${{ secrets.CF_WORKER_URL_1 }}
          CF_WORKER_URL_2: ${{ secrets.CF_WORKER_URL_2 }}
          CF_WORKER_URL_3: ${{ secrets.CF_WORKER_URL_3 }}
          CF_WORKER_URL_4: ${{ secrets.CF_WORKER_URL_4 }}
          CF_WORKER_URL_5: ${{ secrets.CF_WORKER_URL_5 }}
          CF_WORKER_AUTH_KEY_1: ${{ secrets.CF_WORKER_AUTH_KEY_1 }}
          CF_WORKER_AUTH_KEY_2: ${{ secrets.CF_WORKER_AUTH_KEY_2 }}
          CF_WORKER_AUTH_KEY_3: ${{ secrets.CF_WORKER_AUTH_KEY_3 }}
          CF_WORKER_AUTH_KEY_4: ${{ secrets.CF_WORKER_AUTH_KEY_4 }}
          CF_WORKER_AUTH_KEY_5: ${{ secrets.CF_WORKER_AUTH_KEY_5 }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
        run: python src/main.py

      - name: Cleanup cookies
        if: always()
        run: rm -f temp/cookies_*.txt

      - name: Commit database updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add database/ logs/ config/whitelist.json manual_queue/
          git commit -m "Daily pipeline run $(date +%Y-%m-%d)" || exit 0
          git push
